SYMBOLS {
    __STACKSIZE__: type = weak, value = $0300; # 3 pages of stack
}
MEMORY {
    ZP:     start = $00,    size = $100,  type = rw, define = yes;
    HEADER: start = $00,    size = $10,   file = %O;
    RAM:    start = $0200,  size = $0500, define = yes;
    PRG:    start = $8000,  size = $8000, file = %O, fill = yes, define = yes;
    CHR:    start = $0000,  size = $2000, file = %O, fill = yes;
}
SEGMENTS {
    HEADER:   load = HEADER, type = ro;
    STARTUP:  load = PRG,    type = ro,  define = yes;
    LOWCODE:  load = PRG,    type = ro,  optional = yes;
    ONCE:     load = PRG,    type = ro,  optional = yes;
    CODE:     load = PRG,    type = ro,  define = yes;
    RODATA:   load = PRG,    type = ro,  define = yes;
    DATA:     load = PRG,    run = RAM,  type = rw,  define = yes;
    BSS:      load = RAM,    type = bss, define = yes;
    ZEROPAGE: load = ZP,     type = zp;
    VECTORS:  load = PRG,    type = ro,  start = $FFFA;
    CHARS:    load = CHR,    type = ro;
}
FEATURES {
    CONDES: segment = RODATA,
            type = constructor,
            label = __CONSTRUCTOR_TABLE__,
            count = __CONSTRUCTOR_COUNT__;
    CONDES: segment = RODATA,
            type = destructor,
            label = __DESTRUCTOR_TABLE__,
            count = __DESTRUCTOR_COUNT__;
}
